<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pressing Celeste - Facture A4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff9800;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #e68900;
        }

        .app-wrapper {
            max-width: 1400px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px;
            flex: 1.2;
            min-width: 340px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .form-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .form-card h2 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1E3C72, #2B4A7A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
            border-left: 5px solid #ff9800;
            padding-left: 20px;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #1e2f3e;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e8f0;
            border-radius: 16px;
            font-size: 0.9rem;
            font-family: inherit;
            background: white;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #ff9800;
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 152, 0, 0.1);
            transform: translateY(-1px);
        }

        button {
            background: linear-gradient(135deg, #ff9800, #ffb74d);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-generate {
            background: linear-gradient(135deg, #1E3C72, #2B4A7A);
            width: 100%;
            margin-top: 10px;
        }

        .btn-generate:hover {
            background: linear-gradient(135deg, #0f2a4f, #1E3C72);
        }

        .btn-add {
            background: linear-gradient(135deg, #2c7da0, #3e9bc0);
            width: auto;
            padding: 10px 24px;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .btn-remove {
            background: linear-gradient(135deg, #e04e2e, #ff6b4a);
            padding: 8px 16px;
            font-size: 0.8rem;
            margin: 0;
            width: auto;
            min-width: 36px;
        }

        .btn-remove:hover {
            background: linear-gradient(135deg, #c43d1f, #e04e2e);
        }

        .product-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
            flex-wrap: wrap;
            background: #f8fafc;
            padding: 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .product-row:hover {
            background: #f0f4f8;
            transform: translateX(5px);
        }

        .product-row select {
            flex: 2;
            min-width: 140px;
        }

        .product-row .qty-input {
            width: 90px;
        }

        .preview-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            flex: 1.4;
            min-width: 520px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .preview-card:hover {
            transform: translateY(-5px);
        }

        .preview-card h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1E3C72;
            margin-bottom: 20px;
            padding-left: 12px;
            border-left: 4px solid #ff9800;
        }

        .invoice-container {
            background: #fefefe;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #e4edf4;
            overflow-x: auto;
            max-height: 80vh;
            overflow-y: auto;
        }

        .facture-a4 {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 35px 40px;
            border: 1px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .facture-a4:hover {
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .facture-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 3px solid #ff9800;
            padding-bottom: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .brand h1 {
            font-size: 28px;
            color: #1E3C72;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .brand p {
            color: #4a627a;
            font-size: 13px;
            margin: 4px 0;
        }

        .facture-meta {
            text-align: right;
        }

        .facture-meta .numero {
            font-weight: bold;
            background: linear-gradient(135deg, #ff9800, #ffb74d);
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            display: inline-block;
        }

        .client-section {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            padding: 20px 24px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border-left: 4px solid #ff9800;
        }

        .client-info p {
            margin: 6px 0;
        }

        .badge {
            background: white;
            border-radius: 20px;
            padding: 8px 16px;
            display: inline-block;
            font-weight: 500;
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        .facture-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 25px 0;
            border-radius: 16px;
            overflow: hidden;
        }

        .facture-table th {
            background: linear-gradient(135deg, #1E3C72, #2B4A7A);
            color: white;
            padding: 14px 10px;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .facture-table td {
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 10px;
            text-align: center;
            font-size: 14px;
            background: white;
            transition: background 0.3s ease;
        }

        .facture-table tr:hover td {
            background: #f8fafc;
        }

        .totaux {
            margin-top: 25px;
            text-align: right;
            border-top: 2px dashed #cfdfed;
            padding-top: 25px;
        }

        .totaux p {
            margin: 8px 0;
            font-size: 16px;
            color: #4a627a;
        }

        .total-final {
            font-size: 24px;
            font-weight: 800;
            color: #1E3C72;
            margin-top: 12px !important;
            padding-top: 8px;
            border-top: 2px solid #ff9800;
            display: inline-block;
        }

        .facture-footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: #6c757d;
            border-top: 1px solid #e2e8f0;
            padding-top: 25px;
            line-height: 1.6;
        }

        .btn-download {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            width: 100%;
            margin-top: 20px;
            font-size: 1rem;
        }

        .btn-download:hover {
            background: linear-gradient(135deg, #1e8a4d, #27ae60);
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @media (max-width: 1024px) {
            .app-wrapper {
                gap: 20px;
            }
            
            .form-card, .preview-card {
                min-width: 300px;
            }
            
            .facture-a4 {
                padding: 25px 30px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }
            
            .app-wrapper {
                flex-direction: column;
            }
            
            .form-card, .preview-card {
                min-width: auto;
            }
            
            .facture-a4 {
                padding: 20px 25px;
            }
            
            .facture-header {
                flex-direction: column;
                text-align: center;
            }
            
            .facture-meta {
                text-align: center;
            }
            
            .client-section {
                flex-direction: column;
                text-align: center;
            }
            
            .totaux {
                text-align: center;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="form-card">
        <h2>Nouvelle facture</h2>
        <div class="form-group">
            <label>Nom du client</label>
            <input type="text" id="clientName" placeholder="Ex: Mme Benedicte">
        </div>
        <div class="form-group">
            <label>Date d'emission</label>
            <input type="date" id="invoiceDate">
        </div>
        <label>Produits / Prestations</label>
        <div id="productsList">
            <div class="product-row">
                <select class="serviceSelect">
                    <option value="Nettoyage costume" data-price="3500">Nettoyage costume</option>
                    <option value="Nettoyage robe" data-price="3000">Nettoyage robe</option>
                    <option value="Nettoyage chemise" data-price="2000">Nettoyage chemise</option>
                    <option value="Repassage" data-price="1500">Repassage</option>
                    <option value="Retouches" data-price="2500">Retouches</option>
                    <option value="Nettoyage couette" data-price="5000">Nettoyage couette</option>
                </select>
                <input type="number" class="qty-input" placeholder="Qte" value="1" min="1">
                <button type="button" class="btn-remove" onclick="removeProduct(this)">X</button>
            </div>
        </div>
        <button type="button" class="btn-add" onclick="addProduct()">+ Ajouter une ligne</button>

        <div class="form-group" style="margin-top: 25px;">
            <label>Remise globale (%)</label>
            <input type="number" id="discountValue" value="0" step="5">
        </div>

        <button type="button" class="btn-generate" id="generateBtn">Generer la facture A4</button>
    </div>

    <div class="preview-card">
        <h2>Facture design A4</h2>
        <div class="invoice-container" id="facturePreview">
            <div style="text-align:center;color:#8fa3bc;padding:50px;">Remplissez le formulaire et generez la facture</div>
        </div>
        <button class="btn-download" id="downloadBtn" style="display:none;">Telecharger en PDF (A4)</button>
    </div>
</div>

<script>
    let compteur = localStorage.getItem('factureCompteur');
    if (!compteur) compteur = 1;
    else compteur = parseInt(compteur) + 1;
    localStorage.setItem('factureCompteur', compteur);

    document.getElementById('invoiceDate').value = new Date().toISOString().slice(0,10);

    const priceMap = {
        'Nettoyage costume': 3500,
        'Nettoyage robe': 3000,
        'Nettoyage chemise': 2000,
        'Repassage': 1500,
        'Retouches': 2500,
        'Nettoyage couette': 5000
    };

    function addProduct() {
        const container = document.getElementById('productsList');
        const div = document.createElement('div');
        div.className = 'product-row';
        div.innerHTML = `
            <select class="serviceSelect">
                <option value="Nettoyage costume" data-price="3500">Nettoyage costume</option>
                <option value="Nettoyage robe" data-price="3000">Nettoyage robe</option>
                <option value="Nettoyage chemise" data-price="2000">Nettoyage chemise</option>
                <option value="Repassage" data-price="1500">Repassage</option>
                <option value="Retouches" data-price="2500">Retouches</option>
                <option value="Nettoyage couette" data-price="5000">Nettoyage couette</option>
            </select>
            <input type="number" class="qty-input" placeholder="Qte" value="1" min="1">
            <button type="button" class="btn-remove" onclick="removeProduct(this)">X</button>
        `;
        container.appendChild(div);
    }

    function removeProduct(btn) {
        const container = document.getElementById('productsList');
        if (container.children.length > 1) {
            btn.closest('.product-row').remove();
        } else {
            alert("Au moins un produit requis");
        }
    }

    function getProducts() {
        const rows = document.querySelectorAll('#productsList .product-row');
        const produits = [];
        for (let row of rows) {
            const select = row.querySelector('.serviceSelect');
            const nom = select.value;
            const prix = parseInt(select.options[select.selectedIndex].getAttribute('data-price'));
            const qte = parseInt(row.querySelector('.qty-input').value) || 0;
            if (qte > 0 && prix > 0) produits.push({ nom, qte, prix, total: qte * prix });
        }
        return produits;
    }

    function genererFacture() {
        const client = document.getElementById('clientName').value.trim() || "Client";
        const date = document.getElementById('invoiceDate').value;
        const remisePourcent = parseFloat(document.getElementById('discountValue').value) || 0;
        const produits = getProducts();

        if (produits.length === 0) {
            alert("Ajoutez au moins un produit valide.");
            return false;
        }

        let sousTotal = produits.reduce((acc, p) => acc + p.total, 0);
        let montantRemise = sousTotal * (remisePourcent / 100);
        let total = sousTotal - montantRemise;

        let lignesTableau = "";
        produits.forEach(p => {
            lignesTableau += `
                <tr>
                    <td>${p.nom}</td>
                    <td>${p.qte}</td>
                    <td>${p.prix.toLocaleString()} FCFA</td>
                    <td>${p.total.toLocaleString()} FCFA</td>
                </tr>
            `;
        });

        const factureHTML = `
            <div class="facture-a4" id="factureA4Content">
                <div class="facture-header">
                    <div class="brand">
                        <h1>PRESSING CELESTE - SOUTANE D'OSHOFFA</h1>
                        <p>Nettoyage & repassage de qualite premium</p>
                        <p>+229 0191 947 138 | contact@pressingceleste.com</p>
                        <p>Cotonou</p>
                    </div>
                    <div class="facture-meta">
                        <div class="numero">FACTURE N° ${compteur.toString().padStart(4,'0')}</div>
                        <p style="margin-top:12px;">${date}</p>
                    </div>
                </div>

                <div class="client-section">
                    <div class="client-info">
                        <p><strong>Facture a :</strong></p>
                        <p>${client}</p>
                    </div>
                    <div class="badge">Paiement : especes / Mobile Money</div>
                </div>

                <table class="facture-table">
                    <thead>
                        <tr>
                            <th>Designation</th>
                            <th>Quantite</th>
                            <th>Prix unitaire</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${lignesTableau}
                    </tbody>
                </table>

                <div class="totaux">
                    <p>Sous-total : ${sousTotal.toLocaleString()} FCFA</p>
                    ${remisePourcent > 0 ? `<p>Remise (${remisePourcent}%) : - ${montantRemise.toLocaleString()} FCFA</p>` : ''}
                    <p class="total-final">TOTAL A PAYER : ${total.toLocaleString()} FCFA</p>
                </div>

                <div class="facture-footer">
                    Merci de votre confiance - Nettoyage soigne, retouches rapides <br>
                    Service client disponible du lundi au samedi de 8h a 19h<br>
                    Site web : www.pressingceleste.com
                </div>
            </div>
        `;

        document.getElementById('facturePreview').innerHTML = factureHTML;
        document.getElementById('downloadBtn').style.display = 'block';
        return true;
    }

    function telechargerPDF() {
        const element = document.getElementById('factureA4Content');
        if (!element) {
            alert("Generez la facture d'abord");
            return;
        }
        const opt = {
            margin: [0.5, 0.5, 0.5, 0.5],
            filename: `Facture_${compteur}_${document.getElementById('clientName').value || 'client'}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, letterRendering: true, useCORS: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    document.getElementById('generateBtn').addEventListener('click', genererFacture);
    document.getElementById('downloadBtn').addEventListener('click', telechargerPDF);

    window.addEventListener('load', () => {
        document.getElementById('clientName').value = "Mme Benedicte";
        genererFacture();
    });
</script>
</body>
</html>
